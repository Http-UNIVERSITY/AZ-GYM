<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>CHEST EXERCISE</title>

<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    font-family: sans-serif;
    min-height: 100vh;
    background-image: url('workout.jpg');
    background-size: cover;
    background-attachment: fixed;
    position: relative;
  }

  /* 🔥 dark overlay */
  body::before {
    content: "";
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.45);
    z-index: 0;
  }

  h1 {
    color: white;
    font-size: 38px;
    margin-bottom: 25px;
    text-align: center;
    z-index: 1;
  }

  /* 🔥 video card style */
  video {
    width: 85%;
    max-width: 500px;
    border-radius: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    background: black;
    margin-bottom: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    z-index: 1;
    position: relative;
    filter: brightness(0.95) contrast(1.05);
  }

</style>
</head>

<body>

<h1>WORKOUT VIDEO OF CHEST</h1>

<video autoplay muted playsinline>
  <source src="Chest.mp4" type="video/mp4">
</video>

<video autoplay muted playsinline>
  <source src="Chest1.mp4" type="video/mp4">
</video>

<video autoplay muted playsinline>
  <source src="Chest2.mp4" type="video/mp4">
</video>

<video autoplay muted playsinline>
  <source src="Chest3.mp4" type="video/mp4">
</video>

<script>
  let videos = document.querySelectorAll("video");

  videos.forEach(video => {
    video.addEventListener("loadedmetadata", () => {
      video.currentTime = 0;
      video.play();

      setTimeout(() => {
        video.pause();
      }, 5000);
    });
  });
</script>

</body>
</html>
