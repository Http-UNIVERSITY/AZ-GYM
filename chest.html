<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>CHEST EXERCISE</title>

<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    font-family: sans-serif;
    min-height: 100vh;
    background-image: url('workout.jpg');
    background-size: cover;
    background-attachment: fixed;
  }

  h1 {
    color: black;
    font-size: 40px;
    margin-bottom: 30px;
    text-align: center;
  }

  video {
    width: 90%;
    max-width: 600px;
    border: 2px solid #333;
    border-radius: 10px;
    background: #000;
    margin-bottom: 15px;
  }
</style>
</head>

<body>

<h1>WORKOUT VIDEO OF CHEST</h1>

<!-- VIDEO 1 -->
<video autoplay muted playsinline>
  <source src="Chest.mp4" type="video/mp4">
</video>

<!-- VIDEO 2 -->
<video autoplay muted playsinline>
  <source src="Chest1.mp4" type="video/mp4">
</video>

<!-- VIDEO 3 -->
<video autoplay muted playsinline>
  <source src="Chest2.mp4" type="video/mp4">
</video>

<!-- VIDEO 4 -->
<video autoplay muted playsinline>
  <source src="Chest3.mp4" type="video/mp4">
</video>

<script>
  // 🔥 هر ویدیو فقط 5 ثانیه اجرا شود
  let videos = document.querySelectorAll("video");

  videos.forEach(video => {
    video.addEventListener("loadedmetadata", () => {
      video.currentTime = 0;
      video.play();

      setTimeout(() => {
        video.pause();
      }, 5000); // 5000ms = 5 ثانیه
    });
  });
</script>

</body>
</html>
