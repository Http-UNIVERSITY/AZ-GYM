<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP LOGIN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 🔥 box bigger */
.box{
    background:#222;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
}

/* 🔥 bigger inputs */
input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

/* 🔥 button */
button{
    width:100%;
    padding:14px;
    background:orange;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    font-size:16px;
}

button:hover{
    background:#ffb347;
}
</style>
</head>

<body>

<div class="box">
<h2>🔒 VIP LOGIN</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Enter VIP</button>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    // 🔥 login check
    if(u=="vip" && p=="1234"){
        localStorage.setItem("vip","true");

        // 🔥 مستقیم برود به صفحه 30 روزه
        window.location.href="vippage.html";
    } 
    else {
        alert("Wrong login!");
    }
}
</script>

</body>
</html>
