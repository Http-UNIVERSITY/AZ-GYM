<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP LOGIN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000,#0f0f1f,#000);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Box */
.login-box{
    width:90%;
    max-width:350px;
    background:rgba(255,255,255,0.06);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    text-align:center;
}

/* Title */
h2{
    color:#00d4ff;
    margin-bottom:20px;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d4ff,#7b2ff7);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Small text */
.small{
    font-size:12px;
    opacity:0.7;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>💎 VIP LOGIN</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Enter VIP</button>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="vip" && p=="sobhan @ // @ 2025"){
        localStorage.setItem("vip","true");
        window.location.href="vippage.html";
    } 
    else {
        alert("Wrong login!");
    }
}



    





    
</script>

</body>
</html>
