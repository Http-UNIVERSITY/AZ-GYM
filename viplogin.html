<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP LOGIN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 🔥 BIG BOX (responsive) */
.box{
    background:#222;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:500px;   /* 🔥 بزرگ‌تر شد */
    text-align:center;
}
    
            background-image: url('workout.jpg');
            background-size: cover;
            background-repeat: repeat;
            background-position: center;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
        }

/* 🔥 BIG TITLE */
h2{
    font-size:32px;
    margin-bottom:20px;
}

/* 🔥 BIG INPUTS */
input{
    width:100%;
    padding:18px;      /* 🔥 بزرگ */
    margin:15px 0;
    border-radius:10px;
    border:none;
    font-size:18px;    /* 🔥 متن بزرگ */
}

/* 🔥 BIG BUTTON */
button{
    width:100%;
    padding:18px;
    background:orange;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:10px;
    font-size:18px;
}

button:hover{
    background:#ffb347;
}
</style>
</head>

<body>

<div class="box">
<h2>🔒 VIP LOGIN</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Enter VIP</button>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="vip" && p=="1234"){
        localStorage.setItem("vip","true");
        window.location.href="vippage.html";
    } 
    else {
        alert("Wrong login!");
    }
}
</script>

</body>
</html>
